name: Test Feishu Notification

on:
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          echo "开始发送飞书消息..."
          curl -X POST -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "🧪 这是一条测试消息来自 GitHub Actions\n仓库: ${{ github.repository }}\n触发事件: ${{ github.event_name }}"
              }
            }' \
            $FEISHU_WEBHOOK
          echo "发送完成，请检查飞书。"
